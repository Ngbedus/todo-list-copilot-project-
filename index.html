<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #292a31;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            margin: 24px;
            padding: 24px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            font-size: 1.8rem;
            text-align: center;
        }

        .todo-form {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .todo-form input,
        .todo-form select,
        .todo-form button {
            min-width: 120px;
        }

        .todo-form input {
            flex: 1 1 180px;
            padding: 12px 14px;
            border: 1px solid #d8d8e3;
            border-radius: 8px;
            font-size: 1rem;
        }

        .todo-form input[type="date"] {
            flex: 0.9 1 160px;
        }

        .todo-form select {
            flex: 0.8 1 120px;
            padding: 12px 14px;
            border: 1px solid #d8d8e3;
            border-radius: 8px;
            font-size: 1rem;
            background: #fff;
        }

        .todo-form button {
            flex: 0 1 auto;
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            background: #5b6cff;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }

        .task-count {
            margin-bottom: 16px;
            font-size: 0.95rem;
            color: #666;
            text-align: right;
        }

        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 12px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: #f7f7ff;
            border: 1px solid #e3e3f1;
            border-left: 5px solid #5b6cff;
            border-radius: 10px;
        }

        .todo-item.priority-high {
            border-left-color: #ff5f7a;
            background: #fff5f6;
        }

        .todo-item.priority-medium {
            border-left-color: #ffc93c;
            background: #fffbf0;
        }

        .todo-item.priority-low {
            border-left-color: #4caf50;
            background: #f1f8f4;
        }

        .todo-item span,
        .todo-item .edit-input {
            flex: 1;
            margin-right: 16px;
            word-break: break-word;
        }

        .todo-item .edit-input {
            padding: 10px 12px;
            border: 1px solid #d8d8e3;
            border-radius: 8px;
            font-size: 1rem;
        }

        .todo-item button {
            border: none;
            background: transparent;
            color: #ff5f7a;
            cursor: pointer;
            font-weight: bold;
            margin: 0 4px;
        }

        .todo-item .priority-badge {
            display: inline-block;
            padding: 4px 8px;
            margin: 0 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #fff;
        }

        .todo-item .priority-badge.high {
            background: #ff5f7a;
        }

        .todo-item .priority-badge.medium {
            background: #ffc93c;
            color: #333;
        }

        .todo-item .priority-badge.low {
            background: #4caf50;
        }

        .todo-item .priority-select {
            padding: 6px 10px;
            border: 1px solid #d8d8e3;
            border-radius: 4px;
            font-size: 0.85rem;
            background: #fff;
            cursor: pointer;
            margin: 0 4px;
        }

        .todo-item .due-date {
            display: inline-block;
            padding: 4px 8px;
            margin: 0 8px;
            background: #e8f5e9;
            border: 1px solid #81c784;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #2e7d32;
        }

        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="app-container">
        <h1>Todo List</h1>
        <form class="todo-form">
            <input type="text" id="todo-input" placeholder="Enter a new task" autocomplete="off">
            <input type="date" id="todo-date">
            <select id="priority-select">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
            </select>
            <button type="submit">Add</button>
        </form>
        <div class="task-count">
            Tasks: <span id="task-count">0</span>
        </div>
        <ul class="todo-list" id="todo-list">
            <!-- Todo items will appear here -->
        </ul>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.js"></script>
    <script src="script.js"></script>
    
</body>
</html>
